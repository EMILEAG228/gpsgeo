<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="https://plateaux-actu.tg/wp-content/uploads/2024/12/IMG-20241212-WA0141.jpg">
  <title>Convertisseur GPS Pro </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Librairie Proj4JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>

  <style>
    :root {
      --primary: #00e5ff;
      --secondary: #ff6ec7;
      --bg-dark: #0b1120;
      --glass: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    /* === Fond dynamique Animé === */
    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: #eaf2ff;
      min-height: 100vh;
      background: radial-gradient(circle at top right, #1e293b, #0f172a), #0b1120;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* === Header === */
    header {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      padding: 1rem 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    header img {
      height: 40px;
      width: 40px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
    }

    header h1 {
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #00e5ff, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    /* === Main Content === */
    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      width: 100%;
      box-sizing: border-box;
    }

    .hero-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .hero-title h2 {
      font-size: 2rem;
      color: #fff;
      text-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
    }

    .hero-title p {
      color: #94a3b8;
    }

    .converter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
    }

    /* === Glassmorphism Cards === */
    .card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 30px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 229, 255, 0.1);
    }

    .card h3 {
      margin-top: 0;
      font-size: 1.3rem;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    label {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 6px;
      display: block;
      padding-left: 4px;
    }

    input, select {
      width: 100%;
      padding: 12px 15px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      box-sizing: border-box;
      transition: 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.1);
    }

    .inline-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* === Buttons === */
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #00e5ff 0%, #0072ff 100%);
      color: #0b1120;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      filter: brightness(1.1);
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
    }

    /* === Result Box === */
    .result-area {
      margin-top: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 15px;
      min-height: 60px;
      position: relative;
      border: 1px dashed var(--glass-border);
      animation: fadeIn 0.5s ease;
      display: none; /* Caché par défaut */
    }

    .result-text {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #d1d5db;
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: auto;
      padding: 5px 10px;
      font-size: 0.7rem;
      background: var(--glass);
      color: var(--primary);
      margin: 0;
      border: 1px solid var(--primary);
    }

    .maps-link {
      display: inline-block;
      margin-top: 10px;
      color: var(--secondary);
      text-decoration: none;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .maps-link:hover { text-decoration: underline; }

    /* === Footer === */
    footer {
      padding: 30px;
      text-align: center;
      border-top: 1px solid var(--glass-border);
      background: rgba(15, 23, 42, 0.9);
      margin-top: auto;
    }

    footer p { color: #64748b; font-size: 0.9rem; }
    footer strong { color: var(--primary); }

    .return-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 8px 20px;
      border: 1px solid var(--primary);
      border-radius: 50px;
      color: var(--primary);
      text-decoration: none;
      transition: 0.3s;
    }

    .return-btn:hover {
      background: var(--primary);
      color: #000;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .converter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <img src="af.jpg" alt="Logo">
      <h1> GPS Mobile</h1>
    </div>
    <div style="font-size: 0.8rem; color: var(--primary); font-weight: bold;">EMILE AG</div>
  </header>

  <main>
    <div class="hero-title">
      <h2>Convertisseur Géodésique</h2>
      <p>Outil professionnel de conversion entre WGS84 et UTM</p>
    </div>

    <div class="converter-grid">

      <!-- BLOC 1 : GOOGLE -> GARMIN -->
      <div class="card">
        <h3>🌍 Google Maps ⮕ Garmin GPS</h3>
        
        <div class="input-group">
          <label>Latitude (Décimal)</label>
          <input type="number" step="any" id="lat_google" placeholder="ex: 6.1245">
        </div>
        
        <div class="input-group">
          <label>Longitude (Décimal)</label>
          <input type="number" step="any" id="lon_google" placeholder="ex: 1.2233">
        </div>

        <button onclick="convertToGarmin()">Calculer UTM</button>

        <div id="res_garmin_box" class="result-area">
          <button class="copy-btn" onclick="copyText('res_garmin_text')">Copier</button>
          <div id="res_garmin_text" class="result-text"></div>
        </div>
      </div>

      <!-- BLOC 2 : GARMIN -> GOOGLE -->
      <div class="card">
        <h3>🛰️ Garmin UTM ⮕ Google</h3>
        
        <div class="inline-inputs">
          <div class="input-group">
            <label>Zone UTM</label>
            <input type="number" id="utm_zone" value="31" min="1" max="60">
          </div>
          <div class="input-group">
            <label>Hémisphère</label>
            <select id="utm_hemi">
              <option value="north">Nord (N)</option>
              <option value="south">Sud (S)</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label>Easting (X) - mètres</label>
          <input type="number" step="any" id="easting" placeholder="ex: 302450">
        </div>

        <div class="input-group">
          <label>Northing (Y) - mètres</label>
          <input type="number" step="any" id="northing" placeholder="ex: 677400">
        </div>

        <button onclick="convertToGoogle()">Calculer Coordonnées</button>

        <div id="res_google_box" class="result-area">
          <button class="copy-btn" onclick="copyText('res_google_text')">Copier</button>
          <div id="res_google_text" class="result-text"></div>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <p>© 2025 FIOAKEY & AGBABLI | Expert GPS</p>
    <p>Propulsé par <strong>EMILE-AG 🚀</strong></p>
    <a href="garmin.html" class="return-btn">⬅ Retour Accueil</a>
  </footer>

  <script>
    const WGS84 = 'EPSG:4326';

    function convertToGarmin() {
      const lat = parseFloat(document.getElementById('lat_google').value);
      const lon = parseFloat(document.getElementById('lon_google').value);

      if (isNaN(lat) || isNaN(lon)) {
        alert("Veuillez entrer des coordonnées valides.");
        return;
      }

      // Calcul auto de la zone UTM
      const zone = Math.floor((lon + 180) / 6) + 1;
      const hemi = lat >= 0 ? "north" : "south";
      const utmProj = `+proj=utm +zone=${zone} +${hemi} +datum=WGS84 +units=m +no_defs`;

      try {
        const [x, y] = proj4(WGS84, utmProj, [lon, lat]);
        const resultBox = document.getElementById("res_garmin_box");
        const resText = document.getElementById("res_garmin_text");

        resultBox.style.display = "block";
        resText.innerHTML = `
          <strong>Zone UTM :</strong> ${zone}${lat >= 0 ? 'N' : 'S'}<br>
          <strong>X (Easting) :</strong> ${x.toFixed(3)}<br>
          <strong>Y (Northing) :</strong> ${y.toFixed(3)}
        `;
      } catch (e) {
        alert("Erreur de conversion.");
      }
    }

    function convertToGoogle() {
      const x = parseFloat(document.getElementById('easting').value);
      const y = parseFloat(document.getElementById('northing').value);
      const zone = document.getElementById('utm_zone').value;
      const hemi = document.getElementById('utm_hemi').value;

      if (isNaN(x) || isNaN(y)) {
        alert("Veuillez entrer des valeurs UTM valides.");
        return;
      }

      const utmProj = `+proj=utm +zone=${zone} +${hemi} +datum=WGS84 +units=m +no_defs`;

      try {
        const [lon, lat] = proj4(utmProj, WGS84, [x, y]);
        const resultBox = document.getElementById("res_google_box");
        const resText = document.getElementById("res_google_text");

        resultBox.style.display = "block";
        resText.innerHTML = `
          <strong>Lat :</strong> ${lat.toFixed(7)}<br>
          <strong>Lon :</strong> ${lon.toFixed(7)}<br>
          <a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank" class="maps-link">📍 Voir sur Google Maps</a>
        `;
      } catch (e) {
        alert("Zone ou coordonnées invalides pour cette projection.");
      }
    }

    function copyText(elementId) {
      const text = document.getElementById(elementId).innerText.replace('Copier', '');
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        btn.innerText = "Copié !";
        setTimeout(() => btn.innerText = "Copier", 2000);
      });
    }
  </script>
</body>
</html>
