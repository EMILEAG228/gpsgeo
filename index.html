<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://plateaux-actu.tg/wp-content/uploads/2024/12/IMG-20241212-WA0141.jpg">
    <title>GPS Pilotage | Interface Système</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --primary: #00fff0;
            --secondary: #ff0057;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 255, 240, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Overlay de grain cinématographique */
        body::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            z-index: 1;
            pointer-events: none;
        }

        canvas#network {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* Conteneur Principal en Glassmorphism */
        .glass-card {
            position: relative;
            z-index: 2;
            padding: 50px 80px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 255, 240, 0.05);
            animation: cardAppear 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Animation Logo avec Radar */
        .logo-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
        }

        .logo-wrapper::after {
            content: "";
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            border-left-color: transparent;
            border-bottom-color: transparent;
            animation: rotate 3s linear infinite;
        }

        .logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg-dark);
            box-shadow: 0 0 30px var(--primary);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 40px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 255, 240, 0.5));
        }

        /* Bouton Style Cyber-Tech */
        .btn-container {
            position: relative;
            display: inline-block;
        }

        .btn {
            position: relative;
            padding: 20px 60px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            background: transparent;
            border: 1px solid var(--primary);
            overflow: hidden;
            transition: 0.4s;
            letter-spacing: 2px;
        }

        .btn:hover {
            color: var(--bg-dark);
            box-shadow: 0 0 40px var(--primary);
        }

        .btn::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: var(--primary);
            z-index: -1;
            transition: 0.4s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .btn:hover::before {
            left: 0;
        }

        /* Éléments de décoration UI */
        .ui-corner {
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid var(--primary);
        }
        .top-left { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }

        /* Animations */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Scanner Line */
        .scanner-line {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: rgba(0, 255, 240, 0.1);
            box-shadow: 0 0 10px var(--primary);
            z-index: 10;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: -5%; }
            100% { top: 105%; }
        }

        @media(max-width: 768px) {
            .glass-card { padding: 30px; width: 90%; }
            h1 { font-size: 1.8rem; letter-spacing: 3px; }
            .logo-wrapper { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

<div class="scanner-line"></div>
<canvas id="network"></canvas>

<div class="glass-card">
    <div class="ui-corner top-left"></div>
    <div class="ui-corner bottom-right"></div>
    
    <div class="logo-wrapper">
        <!-- Remplacer af.jpg par ton image réelle -->
        <img src="af.jpg" alt="Logo" class="logo">
    </div>

    <h1>FIOAKEY & AG GPS</h1>

    <div class="btn-container">
        <button class="btn" onclick="window.location.href='garmin.html'">
            Initialiser GPS Garmin
        </button>
    </div>
</div>

<script>
    const canvas = document.getElementById('network');
    const ctx = canvas.getContext('2d');
    let width, height, nodes = [];
    const mouse = { x: null, y: null, radius: 150 };

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        nodes = [];
        const count = Math.floor((width * height) / 15000); // Densité adaptative
        
        for(let i = 0; i < count; i++) {
            nodes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        
        for(let i = 0; i < nodes.length; i++) {
            let n = nodes[i];
            
            // Mouvement
            n.x += n.vx;
            n.y += n.vy;

            // Rebond
            if(n.x < 0 || n.x > width) n.vx *= -1;
            if(n.y < 0 || n.y > height) n.vy *= -1;

            // Interaction Souris (Repousser les points)
            let dxMouse = n.x - mouse.x;
            let dyMouse = n.y - mouse.y;
            let distMouse = Math.sqrt(dxMouse*dxMouse + dyMouse*dyMouse);
            
            if(distMouse < mouse.radius) {
                const force = (mouse.radius - distMouse) / mouse.radius;
                n.x += dxMouse * force * 0.05;
                n.y += dyMouse * force * 0.05;
            }

            // Dessin Point
            ctx.fillStyle = 'rgba(0, 255, 240, 0.8)';
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.size, 0, Math.PI*2);
            ctx.fill();

            // Dessin Lignes
            for(let j = i + 1; j < nodes.length; j++) {
                let n2 = nodes[j];
                let dx = n.x - n2.x;
                let dy = n.y - n2.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if(dist < 150) {
                    ctx.strokeStyle = `rgba(0, 255, 240, ${1 - dist/150})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(n.x, n.y);
                    ctx.lineTo(n2.x, n2.y);
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(draw);
    }

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.x;
        mouse.y = e.y;
    });

    window.addEventListener('resize', init);

    init();
    draw();
</script>

</body>
</html>
